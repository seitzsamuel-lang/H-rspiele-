<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HörSpiel Box" />
  <title>HörSpiel Box</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overscroll-behavior: none; }
    body { font-family: 'Nunito', sans-serif; background: #0f172a; color: #fff; overflow-x: hidden; }
    #root { min-height: 100dvh; }
    button { font-family: 'Nunito', sans-serif; cursor: pointer; border: none; transition: transform 0.12s; }
    button:active { transform: scale(0.93) !important; }
    input { font-family: 'Nunito', sans-serif; outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    @keyframes floatUp   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes fadeIn    { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes wave      { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }
    @keyframes pulse     { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.25)} 50%{box-shadow:0 0 0 14px rgba(255,255,255,0)} }
    @keyframes shake     { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

    .float   { animation: floatUp 3s ease-in-out infinite; }
    .fade-in { animation: fadeIn 0.32s ease both; }
    .shake   { animation: shake 0.35s ease; }
    .card-hover:hover { transform: scale(1.03); filter: brightness(1.08); }

    .page {
      min-height: 100dvh;
      background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 100%);
      color: #fff; overflow-y: auto; position: relative;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star  { position: absolute; border-radius: 50%; animation: floatUp ease-in-out infinite; }

    .center-col {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 48px;
    }
    .app-title {
      font-family: 'Baloo 2', cursive; font-weight: 900; font-size: 44px;
      background: linear-gradient(135deg, #f472b6, #fbbf24, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.15; text-align: center; margin: 8px 0;
    }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 20px; margin-bottom: 28px; }

    /* USER SELECT */
    .user-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 14px; width: 100%; max-width: 400px; margin-bottom: 24px;
    }
    .user-card {
      background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 22px; padding: 18px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      backdrop-filter: blur(8px);
    }
    .avatar-circle {
      width: 58px; height: 58px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; flex-shrink: 0;
    }
    .user-card-name { color: #fff; font-size: 14px; font-weight: 700; text-align: center; }
    .ghost-btn {
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px; color: rgba(255,255,255,0.8); font-size: 15px; padding: 12px 20px;
    }
    .admin-btn {
      margin-top: 16px;
      background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.08);
      border-radius: 14px; color: rgba(255,255,255,0.35); font-size: 13px; padding: 10px 18px;
    }

    /* MODE SELECT */
    .mode-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; width: 100%; max-width: 380px; margin-bottom: 24px;
    }
    .mode-card {
      background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 24px; padding: 28px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      backdrop-filter: blur(8px);
    }
    .mode-emoji { font-size: 56px; }
    .mode-label { color: #fff; font-size: 18px; font-weight: 800; text-align: center; }
    .mode-sub   { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; }

    /* BACK / COMMON */
    .back-btn {
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px; color: #fff; font-size: 15px; padding: 10px 18px;
      margin-bottom: 16px; display: inline-block;
    }
    .primary-btn {
      width: 100%; background: linear-gradient(135deg, #f472b6, #fbbf24);
      border-radius: 18px; color: #fff; font-size: 19px; font-weight: 800; padding: 15px;
      margin-top: 8px;
    }
    .lib-header { position: relative; z-index: 1; padding: 20px 16px 12px; }
    .user-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 30px; padding: 6px 14px 6px 6px; margin-bottom: 10px;
    }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 10px 16px;
    }
    .search-input { background: none; border: none; color: #fff; font-size: 17px; width: 100%; }
    .list-wrap { position: relative; z-index: 1; padding: 8px 16px 40px; display: flex; flex-direction: column; gap: 10px; }

    /* MODE BADGE */
    .mode-badge {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 20px; padding: 6px 14px; font-size: 15px; font-weight: 800;
      margin-bottom: 10px;
    }

    /* NO FOLDER BANNER */
    .no-folder-banner {
      background: rgba(255,255,255,0.06); border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 16px; padding: 20px; text-align: center;
      color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.6;
      margin: 16px;
    }

    /* SERIES */
    .series-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 14px; backdrop-filter: blur(8px); text-align: left;
    }
    .series-cover {
      width: 62px; height: 62px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; flex-shrink: 0;
    }
    .series-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .series-title { color: #fff; font-size: 18px; font-weight: 800; }
    .series-meta  { color: rgba(255,255,255,0.5); font-size: 13px; }
    .mini-bar { height: 5px; background: rgba(255,255,255,0.12); border-radius: 3px; overflow: hidden; margin-top: 3px; }
    .mini-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

    /* EPISODES */
    .ep-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.08);
      border-radius: 18px; padding: 14px 16px; width: 100%;
      backdrop-filter: blur(6px); text-align: left;
    }
    .ep-num {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .ep-title { color: #fff; font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .ep-meta  { color: rgba(255,255,255,0.5); font-size: 13px; }

    /* RESUME */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 200; padding: 24px;
    }
    .dialog {
      background: linear-gradient(160deg,#1e1b4b,#0f172a);
      border: 2px solid rgba(255,255,255,0.15); border-radius: 28px;
      padding: 36px 28px; text-align: center; max-width: 360px; width: 100%;
    }
    .dialog-btn {
      display: block; width: 100%; border-radius: 18px; color: #fff;
      font-size: 19px; font-weight: 800; padding: 15px; margin-bottom: 12px;
    }

    /* PLAYER */
    .player-wrap {
      position: relative; z-index: 1;
      padding: 20px 20px 48px; max-width: 460px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
    }
    .player-top { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 24px; }
    .player-cover {
      width: 210px; height: 210px; border-radius: 32px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; position: relative; flex-shrink: 0; font-size: 90px;
    }
    .wave-row { position: absolute; bottom: -18px; display: flex; gap: 4px; align-items: center; }
    .wave-bar { width: 6px; height: 20px; border-radius: 3px; background: rgba(255,255,255,0.7); animation: wave 0.7s ease-in-out infinite alternate; }
    .seek-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 24px; }
    .time-label { font-size: 13px; color: rgba(255,255,255,0.55); width: 36px; text-align: center; flex-shrink: 0; }
    .seek-bar   { flex: 1; height: 6px; cursor: pointer; accent-color: #f472b6; }
    .controls   { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; margin-bottom: 20px; }
    .skip-btn {
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 18px; color: #fff; padding: 14px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .play-btn {
      width: 88px; height: 88px; border-radius: 28px; color: #fff;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s ease-in-out infinite; font-size: 42px;
    }
    .speed-row  { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .speed-btn  { border-radius: 12px; color: #fff; font-size: 14px; padding: 7px 13px; }

    /* ADMIN */
    .admin-panel {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 20px; margin-bottom: 16px;
    }
    .admin-section-title {
      font-size: 16px; font-weight: 800; color: rgba(255,255,255,0.7);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .folder-status {
      background: rgba(255,255,255,0.07); border-radius: 12px;
      padding: 12px 14px; margin-bottom: 10px;
      font-size: 14px; color: rgba(255,255,255,0.6);
      display: flex; align-items: center; gap: 10px;
    }
    .folder-pick-btn {
      background: linear-gradient(135deg, #f472b6, #fbbf24);
      border-radius: 14px; color: #fff; font-size: 15px; font-weight: 800;
      padding: 12px 18px; width: 100%; margin-top: 4px;
    }

    /* PIN */
    .pin-dots { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
    .pin-dot  { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.2s; }
    .pin-dot.filled { background: #f472b6; }
    .pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 280px; margin: 0 auto; }
    .pin-key  {
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px; color: #fff; font-size: 24px; font-weight: 800;
      padding: 18px; text-align: center;
    }
    .pin-key.del { font-size: 18px; background: rgba(255,100,100,0.15); border-color: rgba(255,100,100,0.2); }

    /* EDIT USERS */
    .edit-row {
      display: flex; gap: 14px; align-items: flex-start;
      background: rgba(255,255,255,0.06); border-radius: 18px; padding: 14px; margin-bottom: 12px;
    }
    .name-input {
      width: 100%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px; color: #fff; font-size: 18px; padding: 8px 14px; margin-bottom: 8px;
    }
    .avatar-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .emoji-btn  { width: 36px; height: 36px; border-radius: 50%; font-size: 19px; }

    #audio-player { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<audio id="audio-player" preload="none"></audio>

<script>
// ============================================================
// STORAGE
// ============================================================
const STORAGE_KEY = "hoerspiel_v3";
function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// ============================================================
// STATE
// ============================================================
let appData = loadData();

let users = appData._users || [
  { id:"u1", name:"Kind 1", avatar:"🐻", color:"#FF6B9D" },
  { id:"u2", name:"Kind 2", avatar:"🦊", color:"#F59E0B" },
  { id:"u3", name:"Kind 3", avatar:"🐸", color:"#10B981" },
  { id:"u4", name:"Kind 4", avatar:"🐼", color:"#8B5CF6" },
  { id:"u5", name:"Kind 5", avatar:"🐯", color:"#3B82F6" },
];

// Separate libraries for audiobooks and music
let libraryHoerspiele = appData._libraryHoerspiele || getDemoHoerspiele();
let libraryMusik      = appData._libraryMusik      || getDemoMusik();

// Folder handles can't be persisted across sessions — user must re-pick each time
// We store names only for display
let folderNameHoerspiele = appData._folderNameHoerspiele || null;
let folderNameMusik      = appData._folderNameMusik      || null;

const ADMIN_PIN = "0000";

let currentUser    = null;
let currentMode    = null; // "hoerspiele" | "musik"
let selectedSeries = null;
let selectedEpisode = null;
let playerStartPos = 0;
let playSpeed      = 1;
let isPlaying      = false;

const audioEl = document.getElementById("audio-player");
const root    = document.getElementById("root");

const ALL_AVATARS = ["🐻","🦊","🐸","🐼","🐯","🦁","🐨","🐰","🦄","🐙","🦋","🐬","🐺","🦝","🐧"];
const AUDIO_EXT   = /\.(mp3|m4a|ogg|aac|flac|wav|opus|wma)$/i;

const COLORS  = ["#F59E0B","#EC4899","#3B82F6","#10B981","#8B5CF6","#EF4444","#F97316","#06B6D4","#84CC16","#F43F5E"];
const EMOJIS_H = ["🔍","🧙‍♀️","🐘","🧚","🕵️","🦕","🐯","⚡","🌙","🎭"];
const EMOJIS_M = ["🎵","🎶","🎸","🥁","🎹","🎺","🎻","🪗","🎤","🎧"];

// ============================================================
// DEMO DATA
// ============================================================
function getDemoHoerspiele() {
  return [
    { id:"3f", title:"Die drei ???", emoji:"🔍", color:"#F59E0B", type:"series", episodes:[
      { id:"3f-1", number:1, title:"Und der Super-Papagei",     file:"", duration:3600 },
      { id:"3f-2", number:2, title:"Und das Gespensterschloss", file:"", duration:3400 },
      { id:"3f-3", number:3, title:"Und der grüne Geist",       file:"", duration:2900 },
    ]},
    { id:"bibi", title:"Bibi Blocksberg", emoji:"🧙‍♀️", color:"#EC4899", type:"series", episodes:[
      { id:"bibi-1", number:1, title:"Bibi Blocksberg",          file:"", duration:2700 },
      { id:"bibi-2", number:2, title:"Bibi und der Zauberbesen", file:"", duration:2400 },
    ]},
    { id:"tkkg", title:"TKKG – Das Geheimnis", emoji:"🕵️", color:"#8B5CF6", type:"single", episodes:[
      { id:"tkkg-1", number:1, title:"Das Geheimnis der Höhle", file:"", duration:3600 },
    ]},
  ];
}
function getDemoMusik() {
  return [
    { id:"kinderlieder", title:"Kinderlieder", emoji:"🎵", color:"#10B981", type:"series", episodes:[
      { id:"kl-1", number:1, title:"Alle meine Entchen",  file:"", duration:90 },
      { id:"kl-2", number:2, title:"Hänschen klein",       file:"", duration:85 },
      { id:"kl-3", number:3, title:"Fuchs du hast die Gans gestohlen", file:"", duration:100 },
    ]},
    { id:"schlaflieder", title:"Schlaflieder", emoji:"🌙", color:"#6366F1", type:"series", episodes:[
      { id:"sl-1", number:1, title:"Guten Abend, Gute Nacht", file:"", duration:120 },
      { id:"sl-2", number:2, title:"Der Mond ist aufgegangen",  file:"", duration:110 },
    ]},
  ];
}

// ============================================================
// HELPERS
// ============================================================
function fmt(s) {
  if (!s || isNaN(s)) return "0:00";
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
}
function render(node) { root.innerHTML=""; root.appendChild(node); }
function el(tag,cls,html="") {
  const d=document.createElement(tag);
  if(cls) d.className=cls;
  if(html) d.innerHTML=html;
  return d;
}
function getUserData() { return appData[currentUser?.id] || {}; }
function saveProgress(epId, pos) {
  if (!currentUser) return;
  appData[currentUser.id] = appData[currentUser.id] || {};
  appData[currentUser.id][epId] = { position:pos, updatedAt:Date.now() };
  saveData(appData);
}
function getPos(epId) { return appData[currentUser?.id]?.[epId]?.position || 0; }
function currentLibrary() { return currentMode==="hoerspiele" ? libraryHoerspiele : libraryMusik; }

function makeStar(i) {
  const d=document.createElement("div"); d.className="star";
  d.style.cssText=`left:${(i*37+11)%100}%;top:${(i*53+7)%100}%;width:${i%5===0?3:2}px;height:${i%5===0?3:2}px;background:rgba(255,255,255,${0.2+(i%4)*0.12});animation-duration:${3+(i%4)}s;animation-delay:${(i*0.3)%4}s`;
  return d;
}
function starsDiv() {
  const d=document.createElement("div"); d.className="stars";
  for(let i=0;i<35;i++) d.appendChild(makeStar(i));
  return d;
}

// ============================================================
// SCREEN: USER SELECT
// ============================================================
function screenUserSelect() {
  currentUser=null; currentMode=null;
  const page=el("div","page"); page.appendChild(starsDiv());
  const col=el("div","center-col");
  col.innerHTML=`<div class="float" style="font-size:80px;margin-bottom:4px">🎧</div><h1 class="app-title">HörSpiel<br/>Box</h1><p class="subtitle">Wer hört heute?</p>`;
  const grid=el("div","user-grid");
  users.forEach((u,i)=>{
    const btn=el("button","user-card card-hover fade-in");
    btn.style.animationDelay=`${i*0.07}s`;
    btn.innerHTML=`<div class="avatar-circle" style="background:${u.color}">${u.avatar}</div><span class="user-card-name">${u.name}</span>`;
    btn.onclick=()=>{ currentUser=u; screenModeSelect(); };
    grid.appendChild(btn);
  });
  col.appendChild(grid);
  const editBtn=el("button","ghost-btn","✏️ Namen &amp; Symbole ändern");
  editBtn.onclick=screenEditUsers; col.appendChild(editBtn);
  const adminBtn=el("button","admin-btn","🔐 Admin");
  adminBtn.onclick=screenAdminPin; col.appendChild(adminBtn);
  page.appendChild(col);
  render(page);
}

// ============================================================
// SCREEN: MODE SELECT (Hörspiele / Musik)
// ============================================================
function screenModeSelect() {
  const page=el("div","page"); page.appendChild(starsDiv());
  const col=el("div","center-col");

  // User pill
  const pill=el("button","user-pill");
  pill.innerHTML=`<div class="avatar-circle" style="width:38px;height:38px;font-size:22px;background:${currentUser.color}">${currentUser.avatar}</div><span style="color:#fff;font-size:15px;font-weight:700">${currentUser.name}</span><span style="color:rgba(255,255,255,0.45);font-size:12px">wechseln</span>`;
  pill.onclick=screenUserSelect; col.appendChild(pill);

  const h=el("h2","app-title","Was möchtest du?"); h.style.fontSize="28px"; col.appendChild(h);
  const sub=el("p","subtitle","Wähle eine Kategorie"); sub.style.marginTop="4px"; col.appendChild(sub);

  const grid=el("div","mode-grid");

  // Hörspiele
  const hCard=el("button","mode-card card-hover fade-in");
  hCard.style.animationDelay="0.05s";
  hCard.innerHTML=`<span class="mode-emoji">🎧</span><span class="mode-label">Hörspiele</span><span class="mode-sub">${libraryHoerspiele.length} Serien</span>`;
  hCard.style.borderColor="#F59E0B44";
  hCard.onclick=()=>{ currentMode="hoerspiele"; screenLibrary(); };

  // Musik
  const mCard=el("button","mode-card card-hover fade-in");
  mCard.style.animationDelay="0.12s";
  mCard.innerHTML=`<span class="mode-emoji">🎵</span><span class="mode-label">Musik</span><span class="mode-sub">${libraryMusik.length} Alben</span>`;
  mCard.style.borderColor="#10B98144";
  mCard.onclick=()=>{ currentMode="musik"; screenLibrary(); };

  grid.appendChild(hCard); grid.appendChild(mCard);
  col.appendChild(grid);
  page.appendChild(col);
  render(page);
}

// ============================================================
// SCREEN: LIBRARY
// ============================================================
function screenLibrary() {
  const lib=currentLibrary();
  const isMusik=currentMode==="musik";
  const accentColor=isMusik?"#10B981":"#F59E0B";
  const modeLabel=isMusik?"🎵 Musik":"🎧 Hörspiele";

  const page=el("div","page"); page.appendChild(starsDiv());
  const hdr=el("div","lib-header");

  // User pill
  const pill=el("button","user-pill");

  page.appendChild(hdr);

  const listWrap=el("div","list-wrap"); page.appendChild(listWrap);

  function buildList(q="") {
    listWrap.innerHTML="";

      const banner=el("div","no-folder-banner");
      banner.innerHTML=`Keine Einträge gefunden.<br/>Bitte den Admin bitten, den ${isMusik?"Musik":"Hörspiele"}-Ordner einzurichten.`;

          ${started>0?`<div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>`:""}

      card.onclick=()=>{ selectedSeries=s; s.type==="single"?openEpisode(s.episodes[0]):screenEpisodes(); };

// SCREEN: EPISODES
// ============================================================
function screenEpisodes() {
  const s=selectedSeries;
  const isMusik=currentMode==="musik";
  const page=el("div","page"); page.appendChild(starsDiv());
  const wrap=el("div",""); wrap.style="position:relative;z-index:1";
  const hdr=el("div","lib-header");
  const back=el("button","back-btn","← Zurück"); back.onclick=screenLibrary; hdr.appendChild(back);
  const top=el("div",""); top.style="display:flex;align-items:center;gap:14px;margin-bottom:4px";
  top.innerHTML=`<div class="series-cover" style="width:68px;height:68px;font-size:38px;background:${s.color};flex-shrink:0">${s.emoji}</div>
    <div><h1 class="app-title" style="font-size:24px;text-align:left">${s.title}</h1>
    <p style="color:rgba(255,255,255,0.5);font-size:14px">${s.episodes.length} ${isMusik?"Lieder":"Folgen"}</p></div>`;
  hdr.appendChild(top); wrap.appendChild(hdr);
  const list=el("div","list-wrap");
  s.episodes.forEach((ep,i)=>{
    const pos=getPos(ep.id);
    const pct=ep.duration>0?Math.min(100,Math.round((pos/ep.duration)*100)):0;
    const done=pct>=95;
    const card=el("button","ep-card card-hover fade-in");
    card.style.cssText=`border-left:5px solid ${s.color};animation-delay:${i*0.06}s`;
    card.innerHTML=`
      <div class="ep-num" style="background:${done?s.color:"rgba(255,255,255,0.1)"}">${done?"✓":ep.number}</div>
      <div style="flex:1;text-align:left">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-meta">${fmt(ep.duration)}${pos>5&&!done?` <span style="color:${s.color}">· ${pct}% gehört</span>`:""}${done?` <span style="color:${s.color}">· Fertig ✓</span>`:""}</div>
        ${pos>5&&!done?`<div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>`:""}
      </div>
      <span style="font-size:22px;color:rgba(255,255,255,0.3)">›</span>`;
    card.onclick=()=>openEpisode(ep);
    list.appendChild(card);
  });

  render(page);
}

function openEpisode(ep) {
  selectedEpisode=ep;
  const pos=getPos(ep.id);
  if(pos>5&&pos<ep.duration-10) screenResume(pos);
  else { playerStartPos=0; screenPlayer(); }
}

// ============================================================
// PLAYER
// ============================================================
function screenPlayer() {
  const s=selectedSeries; const ep=selectedEpisode;
  let curPos=playerStartPos; isPlaying=false;
  if(ep.file){ audioEl.src=ep.file; audioEl.currentTime=curPos; audioEl.playbackRate=playSpeed; }

  const page=el("div","page");
  page.style.background=`linear-gradient(160deg,${s.color}18 0%,#0f172a 55%)`;
  page.appendChild(starsDiv());
  const wrap=el("div","player-wrap");

  // Top
  const top=el("div","player-top");
  const back=el("button","back-btn","← Zurück");
  back.onclick=()=>{ audioEl.pause(); isPlaying=false; saveProgress(ep.id,curPos); selectedSeries.type==="single"?screenLibrary():screenEpisodes(); };
  const pill=el("div","user-pill");
  pill.innerHTML=`<div class="avatar-circle" style="width:32px;height:32px;font-size:18px;background:${currentUser.color}">${currentUser.avatar}</div><span style="color:#fff;font-size:14px;font-weight:700">${currentUser.name}</span>`;
  top.appendChild(back); top.appendChild(pill); wrap.appendChild(top);

  // Cover
  const cover=el("div","player-cover");
  cover.style.cssText=`background:${s.color};box-shadow:0 24px 60px ${s.color}55`;
  cover.innerHTML=`<span style="font-size:90px">${s.emoji}</span>`;
  const waveRow=el("div","wave-row");
  for(let i=1;i<=5;i++){ const b=el("div","wave-bar"); b.style.animationDelay=`${i*0.12}s`; waveRow.appendChild(b); }
  waveRow.style.display="none"; cover.appendChild(waveRow); wrap.appendChild(cover);

  const sl=el("p",""); sl.style.cssText="color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:2px;text-align:center"; sl.textContent=s.title; wrap.appendChild(sl);
  const el2=el("h2","app-title",ep.title); el2.style.cssText="font-size:20px;text-align:center;margin-bottom:20px"; wrap.appendChild(el2);

  // Seek
  const seekRow=el("div","seek-row");
  const timeCur=el("span","time-label",fmt(curPos));
  const seekBar=document.createElement("input"); seekBar.type="range"; seekBar.className="seek-bar"; seekBar.min=0; seekBar.max=ep.duration||3600; seekBar.value=curPos;
  const timeDur=el("span","time-label",fmt(ep.duration));
  seekRow.appendChild(timeCur); seekRow.appendChild(seekBar); seekRow.appendChild(timeDur); wrap.appendChild(seekRow);

  function updateSeek(pos){ curPos=pos; seekBar.value=pos; timeCur.textContent=fmt(pos); }
  seekBar.oninput=e=>{ curPos=Number(e.target.value); timeCur.textContent=fmt(curPos); if(ep.file) audioEl.currentTime=curPos; };
  seekBar.onchange=()=>saveProgress(ep.id,curPos);

  // Controls
  const controls=el("div","controls");
  const skipBack=el("button","skip-btn"); skipBack.innerHTML=`<span style="font-size:26px">⏮</span><span style="font-size:11px;opacity:0.7">30s</span>`;
  skipBack.onclick=()=>{ curPos=Math.max(0,curPos-30); updateSeek(curPos); if(ep.file) audioEl.currentTime=curPos; saveProgress(ep.id,curPos); };
  const playBtn=el("button","play-btn","▶"); playBtn.style.cssText=`background:${s.color};box-shadow:0 8px 28px ${s.color}88`;
  const skipFwd=el("button","skip-btn"); skipFwd.innerHTML=`<span style="font-size:26px">⏭</span><span style="font-size:11px;opacity:0.7">30s</span>`;
  skipFwd.onclick=()=>{ curPos=Math.min(ep.duration||9999,curPos+30); updateSeek(curPos); if(ep.file) audioEl.currentTime=curPos; saveProgress(ep.id,curPos); };
  controls.appendChild(skipBack); controls.appendChild(playBtn); controls.appendChild(skipFwd); wrap.appendChild(controls);

  let ticker=null;
  function startPlayback(){ isPlaying=true; playBtn.textContent="⏸"; waveRow.style.display="flex"; if(ep.file) audioEl.play(); else ticker=setInterval(()=>{ curPos=Math.min(ep.duration,curPos+playSpeed); updateSeek(curPos); if(curPos>=ep.duration){ stopPlayback(); } if(Math.round(curPos)%10===0) saveProgress(ep.id,curPos); },1000); }
  function stopPlayback(){ isPlaying=false; playBtn.textContent="▶"; waveRow.style.display="none"; if(ep.file) audioEl.pause(); else { clearInterval(ticker); ticker=null; } saveProgress(ep.id,curPos); }
  playBtn.onclick=()=>{ if(isPlaying) stopPlayback(); else startPlayback(); };
  if(ep.file){ audioEl.ontimeupdate=()=>{ if(isPlaying) updateSeek(Math.round(audioEl.currentTime)); }; audioEl.onended=()=>stopPlayback(); }

  // Speed
  const speedRow=el("div","speed-row");
  speedRow.innerHTML=`<span style="color:rgba(255,255,255,0.4);font-size:13px;margin-right:4px">Tempo:</span>`;
  [0.8,1,1.2,1.5].forEach(sp=>{
    const b=el("button","speed-btn",`${sp}×`);
    b.style.cssText=`background:${playSpeed===sp?s.color:"rgba(255,255,255,0.1)"};font-weight:${playSpeed===sp?800:600}`;
    b.onclick=()=>{ playSpeed=sp; audioEl.playbackRate=sp; speedRow.querySelectorAll(".speed-btn").forEach(bb=>{ bb.style.background="rgba(255,255,255,0.1)"; bb.style.fontWeight=600; }); b.style.background=s.color; b.style.fontWeight=800; };
    speedRow.appendChild(b);
  });
  wrap.appendChild(speedRow);
  page.appendChild(wrap);
  render(page);
}

function screenAdminPin() {
  let pin="";
  const page=el("div","page"); page.appendChild(starsDiv());
  const col=el("div","center-col");
  const back=el("button","back-btn","← Zurück"); back.style.alignSelf="flex-start"; back.onclick=screenUserSelect; col.appendChild(back);
  col.innerHTML+=`<div style="font-size:56px;margin-bottom:4px">🔐</div>`;
  const h=el("h2","app-title","Admin"); h.style.fontSize="32px"; col.appendChild(h);
  const sub=el("p","subtitle","PIN eingeben"); sub.style.marginTop="4px"; col.appendChild(sub);

  // Dots
  const dots=el("div","pin-dots");
  for(let i=0;i<4;i++){ const d=el("div","pin-dot"); d.id=`dot-${i}`; dots.appendChild(d); }
  col.appendChild(dots);

  const errMsg=el("p",""); errMsg.style.cssText="color:#f87171;font-size:15px;height:20px;margin-bottom:8px;text-align:center"; col.appendChild(errMsg);

  // Keypad
  const grid=el("div","pin-grid");
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k=>{
    const btn=el("button",k==="⌫"?"pin-key del":"pin-key",String(k));
    if(k==="") { btn.style.visibility="hidden"; grid.appendChild(btn); return; }
    btn.onclick=()=>{
      if(k==="⌫"){ if(pin.length>0){ pin=pin.slice(0,-1); updateDots(); } return; }
      if(pin.length>=4) return;
      pin+=String(k); updateDots();
      if(pin.length===4){
        if(pin===ADMIN_PIN) screenAdmin();
        else {
          errMsg.textContent="❌ Falscher PIN"; pin=""; updateDots();
          dots.classList.add("shake"); setTimeout(()=>dots.classList.remove("shake"),400);
          setTimeout(()=>errMsg.textContent="",1500);
        }
      }
    };
    grid.appendChild(btn);
  });
  col.appendChild(grid);
  page.appendChild(col);
  render(page);

  function updateDots(){
    for(let i=0;i<4;i++){
      const d=document.getElementById(`dot-${i}`);
      if(d) d.className="pin-dot"+(i<pin.length?" filled":"");
    }
  }
}

// ============================================================
// FOLDER PICKER
// ============================================================
async function pickFolder(mode) {
  if(!window.showDirectoryPicker){ alert("Bitte Chrome oder Edge verwenden."); return; }
  try {
    const dirHandle=await window.showDirectoryPicker({mode:"read"});
    const newLib=await buildLibraryFromFolder(dirHandle, mode);
    if(newLib.length===0){ alert("Keine Audiodateien gefunden!"); return; }
    if(mode==="hoerspiele"){
      libraryHoerspiele=newLib; folderNameHoerspiele=dirHandle.name;
      appData._libraryHoerspiele=newLib; appData._folderNameHoerspiele=dirHandle.name;
    } else {
      libraryMusik=newLib; folderNameMusik=dirHandle.name;
      appData._libraryMusik=newLib; appData._folderNameMusik=dirHandle.name;
    }
    saveData(appData);
    alert(`✅ ${newLib.length} Einträge geladen aus "${dirHandle.name}"`);
  } catch(e){ if(e.name!=="AbortError") alert("Fehler: "+e.message); }
}

function stripExt(name){ return name.replace(/\.[^.]+$/,""); }
function getAudioDuration(url){
  return new Promise(resolve=>{
    const a=new Audio(); a.src=url;
    a.onloadedmetadata=()=>resolve(Math.round(a.duration));
    a.onerror=()=>resolve(0);
    setTimeout(()=>resolve(0),4000);
  });
}

async function buildLibraryFromFolder(dirHandle, mode) {
  const lib=[]; let ci=0;
  const colors=COLORS; const emojis=mode==="musik"?EMOJIS_M:EMOJIS_H;

  for await (const [name,handle] of dirHandle.entries()) {
    if(handle.kind==="directory"){
      const episodes=[]; let epNum=1; const subs=[];
      for await (const [fn,fh] of handle.entries()){
        if(fh.kind==="file"&&AUDIO_EXT.test(fn)) subs.push([fn,fh]);
      }
      subs.sort((a,b)=>a[0].localeCompare(b[0],undefined,{numeric:true}));
      for(const [fn,fh] of subs){
        const file=await fh.getFile(); const url=URL.createObjectURL(file);
        const dur=await getAudioDuration(url);
        episodes.push({id:`${name}-${epNum}`,number:epNum,title:stripExt(fn),file:url,duration:dur}); epNum++;
      }
      if(episodes.length>0){
        lib.push({id:name,title:name,emoji:emojis[ci%emojis.length],color:colors[ci%colors.length],type:episodes.length===1?"single":"series",episodes});
        ci++;
      }
    } else if(handle.kind==="file"&&AUDIO_EXT.test(name)){
      const file=await handle.getFile(); const url=URL.createObjectURL(file);
      const dur=await getAudioDuration(url); const id=stripExt(name);
      lib.push({id,title:id,emoji:emojis[ci%emojis.length],color:colors[ci%colors.length],type:"single",episodes:[{id:`${id}-1`,number:1,title:id,file:url,duration:dur}]});
      ci++;
    }
  }
  lib.sort((a,b)=>a.title.localeCompare(b.title,"de"));
  return lib;
}

// EDIT USERS
// ============================================================
function screenEditUsers() {
  let edited=users.map(u=>({...u}));
  const page=el("div","page"); page.appendChild(starsDiv());
  const col=el("div","center-col"); col.style.cssText="align-items:stretch;max-width:440px;padding:20px 16px 40px;position:relative;z-index:1";
  const back=el("button","back-btn","← Zurück"); back.onclick=screenAdmin; col.appendChild(back);
  const h=el("h2","app-title","Namen ändern"); h.style.cssText="font-size:30px;margin-bottom:16px"; col.appendChild(h);

  function buildRows(){
    const wrap=el("div",""); wrap.id="edit-rows";
    edited.forEach(u=>{
      const row=el("div","edit-row fade-in");
      const av=el("div","avatar-circle"); av.style.cssText=`background:${u.color};font-size:34px;width:54px;height:54px`; av.textContent=u.avatar;
      const right=el("div",""); right.style.flex="1";
      const inp=el("input","name-input"); inp.value=u.name; inp.maxLength=12;
      inp.oninput=e=>{ edited=edited.map(x=>x.id===u.id?{...x,name:e.target.value}:x); };
      const avRow=el("div","avatar-row");
      ALL_AVATARS.forEach(a=>{
        const ab=el("button","emoji-btn",a);
        ab.style.background=u.avatar===a?u.color:"rgba(255,255,255,0.08)";
        ab.onclick=()=>{ edited=edited.map(x=>x.id===u.id?{...x,avatar:a}:x); buildAndInsert(); };
        avRow.appendChild(ab);
      });
      right.appendChild(inp); right.appendChild(avRow);
      row.appendChild(av); row.appendChild(right); wrap.appendChild(row);
    });
    return wrap;
  }
  function buildAndInsert(){ const old=document.getElementById("edit-rows"); const nw=buildRows(); if(old) old.replaceWith(nw); else col.insertBefore(nw,saveBtn); }
  col.appendChild(buildRows());
  const saveBtn=el("button","primary-btn","💾 Speichern");
  saveBtn.onclick=()=>{ users=edited; appData._users=users; saveData(appData); screenAdmin(); };
  col.appendChild(saveBtn);
  page.appendChild(col);
  render(page);
}
