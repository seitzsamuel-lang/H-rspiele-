<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HörSpiel Box" />
  <title>HörSpiel Box</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #0f172a;
      color: #fff;
      overflow-x: hidden;
    }
    #root { min-height: 100dvh; }
    button { font-family: 'Nunito', sans-serif; cursor: pointer; border: none; transition: transform 0.12s; }
    button:active { transform: scale(0.93) !important; }
    input { font-family: 'Nunito', sans-serif; outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    @keyframes floatUp   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes fadeIn    { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes wave      { 0%,100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
    @keyframes pulse     { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.25); } 50% { box-shadow: 0 0 0 14px rgba(255,255,255,0); } }

    .float   { animation: floatUp 3s ease-in-out infinite; }
    .fade-in { animation: fadeIn 0.32s ease both; }
    .card-hover:hover { transform: scale(1.03); filter: brightness(1.08); }

    /* ===== PAGE ===== */
    .page {
      min-height: 100dvh;
      background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 100%);
      color: #fff;
      overflow-y: auto;
      position: relative;
    }
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .star {
      position: absolute; border-radius: 50%;
      animation: floatUp ease-in-out infinite;
    }
    .center-col {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 48px;
    }
    .app-title {
      font-family: 'Baloo 2', cursive; font-weight: 900; font-size: 44px;
      background: linear-gradient(135deg, #f472b6, #fbbf24, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.15; text-align: center; margin: 8px 0;
    }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 20px; margin-bottom: 28px; }

    /* ===== USER SELECT ===== */
    .user-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; width: 100%; max-width: 400px; margin-bottom: 24px;
    }
    .user-card {
      background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 22px; padding: 18px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      backdrop-filter: blur(8px);
    }
    .avatar-circle {
      width: 58px; height: 58px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; flex-shrink: 0;
    }
    .user-card-name { color: #fff; font-size: 14px; font-weight: 700; text-align: center; }
    .ghost-btn {
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px; color: rgba(255,255,255,0.8); font-size: 15px; padding: 12px 20px;
    }

    /* ===== EDIT USERS ===== */
    .back-btn {
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px; color: #fff; font-size: 15px; padding: 10px 18px;
      margin-bottom: 16px; display: inline-block;
    }
    .primary-btn {
      width: 100%; background: linear-gradient(135deg, #f472b6, #fbbf24);
      border-radius: 18px; color: #fff; font-size: 19px; font-weight: 800; padding: 15px;
      margin-top: 8px;
    }
    .edit-row {
      display: flex; gap: 14px; align-items: flex-start;
      background: rgba(255,255,255,0.06); border-radius: 18px; padding: 14px; margin-bottom: 12px;
    }
    .name-input {
      width: 100%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px; color: #fff; font-size: 18px; padding: 8px 14px; margin-bottom: 8px;
    }
    .avatar-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .emoji-btn { width: 36px; height: 36px; border-radius: 50%; font-size: 19px; }

    /* ===== LIBRARY ===== */
    .lib-header { position: relative; z-index: 1; padding: 20px 16px 12px; }
    .user-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 30px; padding: 6px 14px 6px 6px; margin-bottom: 12px;
    }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 10px 16px;
    }
    .search-input { background: none; border: none; color: #fff; font-size: 17px; width: 100%; }
    .list-wrap { position: relative; z-index: 1; padding: 8px 16px 40px; display: flex; flex-direction: column; gap: 10px; }

    .series-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 14px; backdrop-filter: blur(8px); text-align: left;
    }
    .series-cover {
      width: 62px; height: 62px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; flex-shrink: 0;
    }
    .series-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .series-title { color: #fff; font-size: 18px; font-weight: 800; }
    .series-meta  { color: rgba(255,255,255,0.5); font-size: 13px; }
    .mini-bar { height: 5px; background: rgba(255,255,255,0.12); border-radius: 3px; overflow: hidden; margin-top: 3px; }
    .mini-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .chevron { font-size: 24px; color: rgba(255,255,255,0.35); }

    /* ===== EPISODES ===== */
    .ep-card {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.08);
      border-radius: 18px; padding: 14px 16px; width: 100%;
      backdrop-filter: blur(6px); text-align: left;
    }
    .ep-num {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .ep-title { color: #fff; font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .ep-meta  { color: rgba(255,255,255,0.5); font-size: 13px; }

    /* ===== RESUME DIALOG ===== */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 200; padding: 24px;
    }
    .dialog {
      background: linear-gradient(160deg,#1e1b4b,#0f172a);
      border: 2px solid rgba(255,255,255,0.15); border-radius: 28px;
      padding: 36px 28px; text-align: center; max-width: 360px; width: 100%;
    }
    .dialog-text { color: rgba(255,255,255,0.65); font-size: 16px; margin-bottom: 24px; line-height: 1.6; }
    .dialog-btn {
      display: block; width: 100%; border-radius: 18px; color: #fff;
      font-size: 19px; font-weight: 800; padding: 15px; margin-bottom: 12px;
    }

    /* ===== PLAYER ===== */
    .player-wrap {
      position: relative; z-index: 1;
      padding: 20px 20px 48px; max-width: 460px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
    }
    .player-top {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; margin-bottom: 24px;
    }
    .player-cover {
      width: 210px; height: 210px; border-radius: 32px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; position: relative; flex-shrink: 0; font-size: 90px;
    }
    .wave-row { position: absolute; bottom: -18px; display: flex; gap: 4px; align-items: center; }
    .wave-bar {
      width: 6px; height: 20px; border-radius: 3px;
      background: rgba(255,255,255,0.7);
      animation: wave 0.7s ease-in-out infinite alternate;
    }
    .seek-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 24px; }
    .time-label { font-size: 13px; color: rgba(255,255,255,0.55); width: 36px; text-align: center; flex-shrink: 0; }
    .seek-bar   { flex: 1; height: 6px; cursor: pointer; accent-color: #f472b6; }
    .controls   { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; margin-bottom: 20px; }
    .skip-btn {
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 18px; color: #fff; padding: 14px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .skip-icon  { font-size: 26px; }
    .skip-label { font-size: 11px; opacity: 0.7; }
    .play-btn   {
      width: 88px; height: 88px; border-radius: 28px; color: #fff;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2s ease-in-out infinite; font-size: 42px;
    }
    .speed-row  { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .speed-lbl  { color: rgba(255,255,255,0.4); font-size: 13px; margin-right: 4px; }
    .speed-btn  { border-radius: 12px; color: #fff; font-size: 14px; padding: 7px 13px; }

    /* Audio player hidden */
    #audio-player { display: none; }

    /* Folder picker banner */
    .folder-banner {
      background: rgba(255,255,255,0.06); border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 16px; padding: 14px 16px; margin-bottom: 12px;
      text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.5;
    }
    .folder-btn {
      background: linear-gradient(135deg, #f472b6, #fbbf24);
      border-radius: 14px; color: #fff; font-size: 16px; font-weight: 800;
      padding: 12px 20px; margin-top: 8px; display: inline-block;
    }
  </style>
</head>
<body>
<div id="root"></div>
<audio id="audio-player" preload="none"></audio>

<script>
// ============================================================
// STORAGE
// ============================================================
const STORAGE_KEY = "hoerspiel_data_v2";
function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// ============================================================
// STATE
// ============================================================
let appData = loadData();
let users   = appData._users || [
  { id:"u1", name:"Kind 1", avatar:"🐻", color:"#FF6B9D" },
  { id:"u2", name:"Kind 2", avatar:"🦊", color:"#F59E0B" },
  { id:"u3", name:"Kind 3", avatar:"🐸", color:"#10B981" },
  { id:"u4", name:"Kind 4", avatar:"🐼", color:"#8B5CF6" },
  { id:"u5", name:"Kind 5", avatar:"🐯", color:"#3B82F6" },
];

// Hörspiel-Bibliothek wird aus dem Ordner gelesen (oder Demo)
// Struktur: { id, title, emoji, color, type:"series"|"single", episodes:[{id,number,title,file,duration}] }
let library = appData._library || getDemoLibrary();

let currentUser    = null;
let selectedSeries = null;
let selectedEpisode = null;
let playerStartPos = 0;

// Audio
const audioEl = document.getElementById("audio-player");
let isPlaying  = false;
let playSpeed  = 1;

// ============================================================
// DEMO LIBRARY (wird durch echte Dateien ersetzt)
// ============================================================
function getDemoLibrary() {
  return [
    { id:"3f", title:"Die drei ???", emoji:"🔍", color:"#F59E0B", type:"series", episodes:[
      { id:"3f-1", number:1, title:"Und der Super-Papagei",     file:"", duration:3600 },
      { id:"3f-2", number:2, title:"Und das Gespensterschloss", file:"", duration:3400 },
      { id:"3f-3", number:3, title:"Und der grüne Geist",       file:"", duration:2900 },
      { id:"3f-4", number:4, title:"Und die flüsternde Mumie",  file:"", duration:3300 },
    ]},
    { id:"bibi", title:"Bibi Blocksberg", emoji:"🧙‍♀️", color:"#EC4899", type:"series", episodes:[
      { id:"bibi-1", number:1, title:"Bibi Blocksberg",           file:"", duration:2700 },
      { id:"bibi-2", number:2, title:"Bibi und der Zauberbesen",  file:"", duration:2400 },
      { id:"bibi-3", number:3, title:"Bibi und das große Fest",   file:"", duration:3000 },
    ]},
    { id:"benjamin", title:"Benjamin Blümchen", emoji:"🐘", color:"#3B82F6", type:"series", episodes:[
      { id:"benja-1", number:1, title:"Benjamin Blümchen",  file:"", duration:1800 },
      { id:"benja-2", number:2, title:"Als Zoodirektor",   file:"", duration:2100 },
    ]},
    { id:"pumuckl", title:"Pumuckl", emoji:"🧚", color:"#10B981", type:"series", episodes:[
      { id:"pumu-1", number:1, title:"Pumuckl und der Weihnachtsmann", file:"", duration:2600 },
    ]},
    { id:"tkkg", title:"TKKG – Das Geheimnis", emoji:"🕵️", color:"#8B5CF6", type:"single", episodes:[
      { id:"tkkg-1", number:1, title:"Das Geheimnis der Höhle", file:"", duration:3600 },
    ]},
  ];
}

// ============================================================
// HELPERS
// ============================================================
const ALL_AVATARS = ["🐻","🦊","🐸","🐼","🐯","🦁","🐨","🐰","🦄","🐙","🦋","🐬","🐺","🦝","🐧"];

function fmt(s) {
  if (!s || isNaN(s)) return "0:00";
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
}
function getUserData() { return appData[currentUser?.id] || {}; }
function saveProgress(epId, pos) {
  if (!currentUser) return;
  appData[currentUser.id] = appData[currentUser.id] || {};
  appData[currentUser.id][epId] = { position: pos, updatedAt: Date.now() };
  saveData(appData);
}
function getPos(epId) { return appData[currentUser?.id]?.[epId]?.position || 0; }

function makeStar(i) {
  const d = document.createElement("div");
  d.className = "star";
  d.style.cssText = `left:${(i*37+11)%100}%;top:${(i*53+7)%100}%;width:${i%5===0?3:2}px;height:${i%5===0?3:2}px;background:rgba(255,255,255,${0.2+(i%4)*0.12});animation-duration:${3+(i%4)}s;animation-delay:${(i*0.3)%4}s`;
  return d;
}
function starsDiv() {
  const d = document.createElement("div"); d.className="stars";
  for(let i=0;i<35;i++) d.appendChild(makeStar(i));
  return d;
}
function el(tag,cls,html="") {
  const d=document.createElement(tag); if(cls) d.className=cls; if(html) d.innerHTML=html; return d;
}

// ============================================================
// RENDER ENGINE
// ============================================================
const root = document.getElementById("root");
function render(node) { root.innerHTML=""; root.appendChild(node); }

// ============================================================
// SCREEN: USER SELECT
// ============================================================
function screenUserSelect() {
  const page = el("div","page");
  page.appendChild(starsDiv());
  const col = el("div","center-col");
  col.innerHTML = `
    <div class="float" style="font-size:80px;margin-bottom:4px">🎧</div>
    <h1 class="app-title">HörSpiel<br/>Box</h1>
    <p class="subtitle">Wer hört heute?</p>
  `;
  const grid = el("div","user-grid");
  users.forEach((u,i) => {
    const btn = el("button","user-card card-hover fade-in");
    btn.style.animationDelay = `${i*0.07}s`;
    btn.innerHTML = `
      <div class="avatar-circle" style="background:${u.color}">${u.avatar}</div>
      <span class="user-card-name">${u.name}</span>
    `;
    btn.onclick = () => { currentUser = u; screenLibrary(); };
    grid.appendChild(btn);
  });
  col.appendChild(grid);
  const editBtn = el("button","ghost-btn","✏️ Namen &amp; Symbole ändern");
  editBtn.onclick = screenEditUsers;
  col.appendChild(editBtn);
  page.appendChild(col);
  render(page);
}

// ============================================================
// SCREEN: EDIT USERS
// ============================================================
function screenEditUsers() {
  let edited = users.map(u=>({...u}));
  const page = el("div","page"); page.appendChild(starsDiv());
  const col = el("div","center-col"); col.style.cssText="align-items:stretch;max-width:440px;padding:20px 16px 40px;position:relative;z-index:1";
  const back = el("button","back-btn","← Zurück"); back.onclick=screenUserSelect; col.appendChild(back);
  const h = el("h2","app-title","Namen ändern"); h.style.fontSize="30px"; h.style.marginBottom="16px"; col.appendChild(h);

  function buildRows() {
    const wrap = el("div",""); wrap.id="edit-rows";
    edited.forEach(u => {
      const row = el("div","edit-row fade-in");
      const av = el("div","avatar-circle"); av.style.cssText=`background:${u.color};font-size:34px;width:54px;height:54px`; av.textContent=u.avatar;
      const right = el("div",""); right.style.flex="1";
      const inp = el("input","name-input"); inp.value=u.name; inp.maxLength=12;
      inp.oninput = e => { edited=edited.map(x=>x.id===u.id?{...x,name:e.target.value}:x); };
      const avRow = el("div","avatar-row");
      ALL_AVATARS.forEach(a => {
        const ab = el("button","emoji-btn",a);
        ab.style.background = u.avatar===a ? u.color : "rgba(255,255,255,0.08)";
        ab.onclick = () => { edited=edited.map(x=>x.id===u.id?{...x,avatar:a}:x); buildAndInsert(); };
        avRow.appendChild(ab);
      });
      right.appendChild(inp); right.appendChild(avRow);
      row.appendChild(av); row.appendChild(right);
      wrap.appendChild(row);
    });
    return wrap;
  }
  function buildAndInsert() {
    const old = document.getElementById("edit-rows");
    const nw = buildRows();
    if(old) old.replaceWith(nw); else col.insertBefore(nw, saveBtn);
  }
  col.appendChild(buildRows());
  const saveBtn = el("button","primary-btn","💾 Speichern");
  saveBtn.onclick = () => {
    users = edited;
    appData._users = users; saveData(appData);
    screenUserSelect();
  };
  col.appendChild(saveBtn);
  page.appendChild(col);
  render(page);
}

// ============================================================
// SCREEN: LIBRARY
// ============================================================
function screenLibrary() {
  const page = el("div","page"); page.appendChild(starsDiv());

  // Header
  const hdr = el("div","lib-header");
  const pill = el("button","user-pill");
  pill.innerHTML = `<div class="avatar-circle" style="width:38px;height:38px;font-size:22px;background:${currentUser.color}">${currentUser.avatar}</div><span style="color:#fff;font-size:15px;font-weight:700">${currentUser.name}</span><span style="color:rgba(255,255,255,0.45);font-size:12px">wechseln</span>`;
  pill.onclick = () => { audioEl.pause(); isPlaying=false; currentUser=null; screenUserSelect(); };
  hdr.appendChild(pill);
  const title = el("h1","app-title","Meine Hörspiele"); title.style.cssText="font-size:26px;text-align:left;margin-bottom:12px"; hdr.appendChild(title);
  const sb = el("div","search-box"); sb.innerHTML=`<span style="font-size:18px">🔍</span>`;
  const sinp = el("input","search-input"); sinp.placeholder="Suchen…"; sinp.type="text";
  sinp.oninput = () => buildList(sinp.value);
  sb.appendChild(sinp); hdr.appendChild(sb);

  // Folder picker banner
  const banner = el("div","folder-banner");
  banner.innerHTML = `📁 <strong>Hörspiele-Ordner auswählen</strong><br/>Wähle den Ordner mit deinen Hörspielen aus<br/><button class="folder-btn" id="folder-btn">📂 Ordner auswählen</button>`;
  hdr.appendChild(banner);
  page.appendChild(hdr);

  // List
  const listWrap = el("div","list-wrap"); listWrap.id="series-list"; page.appendChild(listWrap);

  function buildList(q="") {
    listWrap.innerHTML = "";
    library.filter(s=>s.title.toLowerCase().includes(q.toLowerCase())).forEach((s,i) => {
      const ud = getUserData();
      let started=0;
      s.episodes.forEach(ep => { if((ud[ep.id]?.position||0)>5) started++; });
      const pct = s.episodes.length>0 ? Math.round((started/s.episodes.length)*100) : 0;

      const card = el("button","series-card card-hover fade-in");
      card.style.animationDelay=`${i*0.06}s`;
      card.innerHTML = `
        <div class="series-cover" style="background:${s.color}">${s.emoji}</div>
        <div class="series-info">
          <span class="series-title">${s.title}</span>
          <span class="series-meta">${s.type==="single"?"🎵 Einzelhörspiel":`📚 ${s.episodes.length} Folgen`}${started>0?` <span style="color:${s.color}">· ${started} gehört</span>`:""}</span>
          ${started>0?`<div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>`:""}
        </div>
        <span class="chevron">›</span>
      `;
      card.onclick = () => {
        selectedSeries = s;
        if(s.type==="single") openEpisode(s.episodes[0]);
        else screenEpisodes();
      };
      listWrap.appendChild(card);
    });
  }
  buildList();

  // Folder picker
  setTimeout(() => {
    const fb = document.getElementById("folder-btn");
    if(fb) fb.onclick = pickFolder;
  }, 100);

  render(page);
}

// ============================================================
// FOLDER PICKER — reads audio files from chosen folder
// ============================================================
async function pickFolder() {
  if (!window.showDirectoryPicker) {
    alert("Dein Browser unterstützt leider keinen Ordner-Zugriff.\nBitte Chrome oder Edge verwenden.");
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker({ mode:"read" });
    const newLib = await buildLibraryFromFolder(dirHandle);
    if(newLib.length === 0) { alert("Keine Audiodateien gefunden!"); return; }
    library = newLib;
    appData._library = library; saveData(appData);
    screenLibrary();
  } catch(e) {
    if(e.name !== "AbortError") alert("Fehler beim Öffnen des Ordners: " + e.message);
  }
}

const AUDIO_EXT = /\.(mp3|m4a|ogg|aac|flac|wav|opus|wma)$/i;

async function buildLibraryFromFolder(dirHandle) {
  const lib = [];
  let colorIdx = 0;
  const colors = ["#F59E0B","#EC4899","#3B82F6","#10B981","#8B5CF6","#EF4444","#F97316","#06B6D4"];
  const emojis = ["🎧","🔍","🐘","🧙‍♀️","🕵️","🦕","🧚","🐯","🦁","🌍","⚡","🎵"];

  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === "directory") {
      // Serie: Unterordner
      const episodes = [];
      let epNum = 1;
      const subEntries = [];
      for await (const [fn, fh] of handle.entries()) {
        if (fh.kind==="file" && AUDIO_EXT.test(fn)) subEntries.push([fn,fh]);
      }
      subEntries.sort((a,b) => a[0].localeCompare(b[0], undefined, {numeric:true}));
      for (const [fn, fh] of subEntries) {
        const file = await fh.getFile();
        const url  = URL.createObjectURL(file);
        const dur  = await getAudioDuration(url);
        episodes.push({ id:`${name}-${epNum}`, number:epNum, title:stripExt(fn), file:url, duration:dur });
        epNum++;
      }
      if (episodes.length > 0) {
        lib.push({ id: name, title: name, emoji: emojis[colorIdx%emojis.length], color: colors[colorIdx%colors.length], type: episodes.length===1?"single":"series", episodes });
        colorIdx++;
      }
    } else if (handle.kind==="file" && AUDIO_EXT.test(name)) {
      // Einzeldatei direkt im Hauptordner
      const file = await handle.getFile();
      const url  = URL.createObjectURL(file);
      const dur  = await getAudioDuration(url);
      const id   = stripExt(name);
      lib.push({ id, title: id, emoji: emojis[colorIdx%emojis.length], color: colors[colorIdx%colors.length], type:"single", episodes:[
        { id:`${id}-1`, number:1, title:id, file:url, duration:dur }
      ]});
      colorIdx++;
    }
  }
  lib.sort((a,b) => a.title.localeCompare(b.title, "de"));
  return lib;
}

function stripExt(name) { return name.replace(/\.[^.]+$/, ""); }
function getAudioDuration(url) {
  return new Promise(resolve => {
    const a = new Audio(); a.src = url;
    a.onloadedmetadata = () => resolve(Math.round(a.duration));
    a.onerror = () => resolve(0);
    setTimeout(() => resolve(0), 4000);
  });
}

// ============================================================
// SCREEN: EPISODES
// ============================================================
function screenEpisodes() {
  const s = selectedSeries;
  const page = el("div","page"); page.appendChild(starsDiv());
  const wrap = el("div",""); wrap.style="position:relative;z-index:1";

  const hdr = el("div","lib-header");
  const back = el("button","back-btn","← Zurück"); back.onclick = screenLibrary; hdr.appendChild(back);
  const top = el("div",""); top.style="display:flex;align-items:center;gap:14px;margin-bottom:4px";
  top.innerHTML = `<div class="series-cover" style="width:68px;height:68px;font-size:38px;background:${s.color};flex-shrink:0">${s.emoji}</div>
    <div><h1 class="app-title" style="font-size:24px;text-align:left">${s.title}</h1>
    <p style="color:rgba(255,255,255,0.5);font-size:14px">${s.episodes.length} Folgen</p></div>`;
  hdr.appendChild(top);
  wrap.appendChild(hdr);

  const list = el("div","list-wrap");
  s.episodes.forEach((ep,i) => {
    const pos = getPos(ep.id);
    const pct = ep.duration>0 ? Math.min(100,Math.round((pos/ep.duration)*100)) : 0;
    const done = pct >= 95;
    const card = el("button","ep-card card-hover fade-in");
    card.style.cssText=`border-left:5px solid ${s.color};animation-delay:${i*0.06}s`;
    card.innerHTML = `
      <div class="ep-num" style="background:${done?s.color:"rgba(255,255,255,0.1)"}">${done?"✓":ep.number}</div>
      <div style="flex:1;text-align:left">
        <div class="ep-title">${ep.title}</div>
        <div class="ep-meta">${fmt(ep.duration)}${pos>5&&!done?` <span style="color:${s.color}">· ${pct}% gehört</span>`:""}${done?` <span style="color:${s.color}">· Fertig ✓</span>`:""}</div>
        ${pos>5&&!done?`<div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>`:""}
      </div>
      <span style="font-size:22px;color:rgba(255,255,255,0.3)">›</span>
    `;
    card.onclick = () => openEpisode(ep);
    list.appendChild(card);
  });
  wrap.appendChild(list);
  page.appendChild(wrap);
  render(page);
}

// ============================================================
// OPEN EPISODE (resume check)
// ============================================================
function openEpisode(ep) {
  selectedEpisode = ep;
  const pos = getPos(ep.id);
  if (pos > 5 && pos < ep.duration - 10) {
    screenResume(pos);
  } else {
    playerStartPos = 0;
    screenPlayer();
  }
}

// ============================================================
// RESUME DIALOG
// ============================================================
function screenResume(pos) {
  const s = selectedSeries; const ep = selectedEpisode;
  const page = el("div","page"); page.appendChild(starsDiv());
  const ov = el("div","overlay");
  const dlg = el("div","dialog fade-in");
  dlg.innerHTML = `
    <div style="font-size:60px;margin-bottom:8px">${s.emoji}</div>
    <h2 class="app-title" style="font-size:22px;margin-bottom:8px">${ep.title}</h2>
    <p class="dialog-text">Du warst bei<br/><strong style="color:#fff;font-size:20px">${fmt(pos)}</strong><br/>von ${fmt(ep.duration)}</p>
  `;
  const btnResume = el("button","dialog-btn","▶️ Weiterhören");
  btnResume.style.background=s.color;
  btnResume.onclick = () => { playerStartPos=pos; screenPlayer(); };
  const btnRestart = el("button","dialog-btn","🔄 Von vorne anfangen");
  btnRestart.style.background="rgba(255,255,255,0.12)";
  btnRestart.onclick = () => { playerStartPos=0; screenPlayer(); };
  dlg.appendChild(btnResume); dlg.appendChild(btnRestart);
  ov.appendChild(dlg); page.appendChild(ov);
  render(page);
}

// ============================================================
// PLAYER SCREEN
// ============================================================
function screenPlayer() {
  const s = selectedSeries; const ep = selectedEpisode;
  let curPos = playerStartPos;
  isPlaying  = false;

  // Load audio if file is available
  if (ep.file) {
    audioEl.src = ep.file;
    audioEl.currentTime = curPos;
    audioEl.playbackRate = playSpeed;
  }

  const page = el("div","page");
  page.style.background = `linear-gradient(160deg,${s.color}18 0%,#0f172a 55%)`;
  page.appendChild(starsDiv());

  const wrap = el("div","player-wrap");

  // Top bar
  const top = el("div","player-top");
  const back = el("button","back-btn","← Zurück");
  back.onclick = () => {
    audioEl.pause(); isPlaying=false;
    saveProgress(ep.id, curPos);
    if(s.type==="single") screenLibrary(); else screenEpisodes();
  };
  const pill = el("div","user-pill");
  pill.innerHTML=`<div class="avatar-circle" style="width:32px;height:32px;font-size:18px;background:${currentUser.color}">${currentUser.avatar}</div><span style="color:#fff;font-size:14px;font-weight:700">${currentUser.name}</span>`;
  top.appendChild(back); top.appendChild(pill); wrap.appendChild(top);

  // Cover
  const cover = el("div","player-cover");
  cover.style.cssText=`background:${s.color};box-shadow:0 24px 60px ${s.color}55`;
  cover.innerHTML=`<span style="font-size:90px">${s.emoji}</span>`;
  const waveRow = el("div","wave-row");
  for(let i=1;i<=5;i++){const b=el("div","wave-bar");b.style.animationDelay=`${i*0.12}s`;waveRow.appendChild(b);}
  waveRow.style.display="none"; cover.appendChild(waveRow); wrap.appendChild(cover);

  const seriesLbl = el("p","",""); seriesLbl.style.cssText="color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:2px;text-align:center"; seriesLbl.textContent=s.title; wrap.appendChild(seriesLbl);
  const epLbl = el("h2","app-title",ep.title); epLbl.style.cssText="font-size:20px;text-align:center;margin-bottom:20px"; wrap.appendChild(epLbl);

  // Seek
  const seekRow = el("div","seek-row");
  const timeCur = el("span","time-label",fmt(curPos));
  const seekBar = el("input","seek-bar"); seekBar.type="range"; seekBar.min=0; seekBar.max=ep.duration||3600; seekBar.value=curPos;
  const timeDur = el("span","time-label",fmt(ep.duration));
  seekRow.appendChild(timeCur); seekRow.appendChild(seekBar); seekRow.appendChild(timeDur);
  wrap.appendChild(seekRow);

  function updateSeek(pos) {
    curPos = pos;
    seekBar.value = pos;
    timeCur.textContent = fmt(pos);
  }

  seekBar.oninput = e => { curPos=Number(e.target.value); timeCur.textContent=fmt(curPos); if(ep.file) audioEl.currentTime=curPos; };
  seekBar.onchange = () => saveProgress(ep.id, curPos);

  // Controls
  const controls = el("div","controls");
  const skipBack = el("button","skip-btn",""); skipBack.innerHTML=`<span class="skip-icon">⏮</span><span class="skip-label">30s</span>`;
  skipBack.onclick = () => { curPos=Math.max(0,curPos-30); updateSeek(curPos); if(ep.file) audioEl.currentTime=curPos; saveProgress(ep.id,curPos); };

  const playBtn = el("button","play-btn","▶");
  playBtn.style.cssText=`background:${s.color};box-shadow:0 8px 28px ${s.color}88`;

  const skipFwd = el("button","skip-btn",""); skipFwd.innerHTML=`<span class="skip-icon">⏭</span><span class="skip-label">30s</span>`;
  skipFwd.onclick = () => { curPos=Math.min(ep.duration||9999,curPos+30); updateSeek(curPos); if(ep.file) audioEl.currentTime=curPos; saveProgress(ep.id,curPos); };

  controls.appendChild(skipBack); controls.appendChild(playBtn); controls.appendChild(skipFwd);
  wrap.appendChild(controls);

  // Simulated playback ticker (for demo files without real audio)
  let ticker = null;
  function startTicker() {
    ticker = setInterval(() => {
      if (!ep.file) {
        curPos = Math.min(ep.duration, curPos + playSpeed);
        updateSeek(curPos);
        if (curPos >= ep.duration) { stopPlayback(); }
        if (Math.round(curPos) % 10 === 0) saveProgress(ep.id, curPos);
      }
    }, 1000);
  }
  function stopTicker() { clearInterval(ticker); ticker=null; }

  function startPlayback() {
    isPlaying=true; playBtn.textContent="⏸"; waveRow.style.display="flex";
    if(ep.file) { audioEl.play(); } else { startTicker(); }
  }
  function stopPlayback() {
    isPlaying=false; playBtn.textContent="▶"; waveRow.style.display="none";
    if(ep.file) audioEl.pause(); else stopTicker();
    saveProgress(ep.id, curPos);
  }

  playBtn.onclick = () => { if(isPlaying) stopPlayback(); else startPlayback(); };

  // Audio events
  if(ep.file) {
    audioEl.ontimeupdate = () => { if(isPlaying) updateSeek(Math.round(audioEl.currentTime)); };
    audioEl.onended = () => stopPlayback();
    audioEl.onerror = () => { startTicker(); }; // fallback
  }

  // Speed
  const speedRow = el("div","speed-row");
  const sl = el("span","speed-lbl","Tempo:");
  speedRow.appendChild(sl);
  [0.8,1,1.2,1.5].forEach(sp => {
    const b = el("button","speed-btn",`${sp}×`);
    b.style.cssText=`background:${playSpeed===sp?s.color:"rgba(255,255,255,0.1)"};font-weight:${playSpeed===sp?800:600}`;
    b.onclick = () => {
      playSpeed=sp; audioEl.playbackRate=sp;
      speedRow.querySelectorAll(".speed-btn").forEach((bb,_)=>{ bb.style.background="rgba(255,255,255,0.1)"; bb.style.fontWeight=600; });
      b.style.background=s.color; b.style.fontWeight=800;
    };
    speedRow.appendChild(b);
  });
  wrap.appendChild(speedRow);
  page.appendChild(wrap);
  render(page);
}
