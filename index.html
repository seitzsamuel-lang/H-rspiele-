<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="HörSpiel Box"/>
  <title>HörSpiel Box</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overscroll-behavior:none;}
    body{font-family:'Nunito',sans-serif;background:#0f172a;color:#fff;overflow-x:hidden;}
    #root{min-height:100dvh;padding-bottom:80px;} /* space for mini player */
    button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;transition:transform 0.12s;}
    button:active{transform:scale(0.93)!important;}
    input,select{font-family:'Nunito',sans-serif;outline:none;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}

    @keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes wave{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.25)}50%{box-shadow:0 0 0 14px rgba(255,255,255,0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.4}}

    .float{animation:floatUp 3s ease-in-out infinite;}
    .fade-in{animation:fadeIn 0.32s ease both;}
    .shake{animation:shake 0.35s ease;}
    .card-hover:hover{transform:scale(1.03);filter:brightness(1.08);}

    .page{min-height:100dvh;background:linear-gradient(160deg,#0f172a 0%,#1e1b4b 100%);color:#fff;overflow-y:auto;position:relative;}
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .star{position:absolute;border-radius:50%;animation:floatUp ease-in-out infinite;}
    .center-col{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;}
    .app-title{font-family:'Baloo 2',cursive;font-weight:900;font-size:44px;background:linear-gradient(135deg,#f472b6,#fbbf24,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15;text-align:center;margin:8px 0;}
    .subtitle{color:rgba(255,255,255,0.6);font-size:20px;margin-bottom:28px;}

    /* USER SELECT */
    .user-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:400px;margin-bottom:24px;}
    .user-card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:22px;padding:18px 8px;display:flex;flex-direction:column;align-items:center;gap:10px;backdrop-filter:blur(8px);position:relative;}
    .avatar-circle{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
    .user-card-name{color:#fff;font-size:14px;font-weight:700;text-align:center;}
    .ghost-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:16px;color:rgba(255,255,255,0.8);font-size:15px;padding:12px 20px;}
    .admin-btn{margin-top:16px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);border-radius:14px;color:rgba(255,255,255,0.35);font-size:13px;padding:10px 18px;}

    /* LIMIT BADGE on user card */
    .limit-badge{position:absolute;top:8px;right:8px;background:rgba(251,191,36,0.2);border:1px solid rgba(251,191,36,0.4);border-radius:8px;font-size:10px;color:#fbbf24;padding:2px 6px;font-weight:800;}
    .limit-reached{opacity:0.45;pointer-events:none;}
    .limit-reached-overlay{position:absolute;inset:0;border-radius:22px;background:rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}

    /* MODE SELECT */
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:380px;margin-bottom:24px;}
    .mode-card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:24px;padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;backdrop-filter:blur(8px);}
    .mode-emoji{font-size:56px;}
    .mode-label{color:#fff;font-size:18px;font-weight:800;text-align:center;}
    .mode-sub{color:rgba(255,255,255,0.5);font-size:13px;text-align:center;}

    /* LAST PLAYED */
    .last-played-card{width:100%;max-width:380px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.15);border-radius:20px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;text-align:left;}
    .last-played-label{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:2px;}
    .last-played-title{font-size:16px;font-weight:800;color:#fff;}
    .last-played-sub{font-size:13px;color:rgba(255,255,255,0.5);}

    /* COMMON */
    .back-btn{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.15);border-radius:14px;color:#fff;font-size:15px;padding:10px 18px;margin-bottom:16px;display:inline-block;}
    .primary-btn{width:100%;background:linear-gradient(135deg,#f472b6,#fbbf24);border-radius:18px;color:#fff;font-size:19px;font-weight:800;padding:15px;margin-top:8px;}
    .danger-btn{width:100%;background:rgba(239,68,68,0.2);border:2px solid rgba(239,68,68,0.3);border-radius:18px;color:#f87171;font-size:16px;font-weight:800;padding:13px;margin-top:8px;}
    .lib-header{position:relative;z-index:1;padding:20px 16px 12px;}
    .user-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:30px;padding:6px 14px 6px 6px;margin-bottom:10px;}
    .search-box{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:16px;padding:10px 16px;}
    .search-input{background:none;border:none;color:#fff;font-size:17px;width:100%;}
    .list-wrap{position:relative;z-index:1;padding:8px 16px 40px;display:flex;flex-direction:column;gap:10px;}
    .mode-badge{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:6px 14px;font-size:15px;font-weight:800;margin-bottom:10px;}

    /* SERIES / EPISODE */
    .series-card{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:20px;padding:14px;backdrop-filter:blur(8px);text-align:left;position:relative;}
    .series-cover{width:62px;height:62px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;}
    .series-info{flex:1;display:flex;flex-direction:column;gap:4px;}
    .series-title{color:#fff;font-size:18px;font-weight:800;}
    .series-meta{color:rgba(255,255,255,0.5);font-size:13px;}
    .mini-bar{height:5px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;margin-top:3px;}
    .mini-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}
    .fav-btn{font-size:22px;padding:4px;background:none;flex-shrink:0;}

    .ep-card{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.08);border-radius:18px;padding:14px 16px;width:100%;backdrop-filter:blur(6px);text-align:left;}
    .ep-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;}
    .ep-title{color:#fff;font-size:16px;font-weight:700;margin-bottom:2px;}
    .ep-meta{color:rgba(255,255,255,0.5);font-size:13px;}

    /* RESUME */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:300;padding:24px;}
    .dialog{background:linear-gradient(160deg,#1e1b4b,#0f172a);border:2px solid rgba(255,255,255,0.15);border-radius:28px;padding:36px 28px;text-align:center;max-width:360px;width:100%;}
    .dialog-btn{display:block;width:100%;border-radius:18px;color:#fff;font-size:19px;font-weight:800;padding:15px;margin-bottom:12px;}

    /* PLAYER */
    .player-wrap{position:relative;z-index:1;padding:20px 20px 48px;max-width:460px;margin:0 auto;display:flex;flex-direction:column;align-items:center;}
    .player-top{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:24px;}
    .player-cover{width:210px;height:210px;border-radius:32px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;flex-shrink:0;font-size:90px;}
    .wave-row{position:absolute;bottom:-18px;display:flex;gap:4px;align-items:center;}
    .wave-bar{width:6px;height:20px;border-radius:3px;background:rgba(255,255,255,0.7);animation:wave 0.7s ease-in-out infinite alternate;}
    .seek-row{display:flex;align-items:center;gap:10px;width:100%;margin-bottom:24px;}
    .time-label{font-size:13px;color:rgba(255,255,255,0.55);width:36px;text-align:center;flex-shrink:0;}
    .seek-bar{flex:1;height:6px;cursor:pointer;accent-color:#f472b6;}
    .controls{display:flex;align-items:center;justify-content:center;gap:20px;width:100%;margin-bottom:20px;}
    .skip-btn{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.15);border-radius:18px;color:#fff;padding:14px 18px;display:flex;flex-direction:column;align-items:center;gap:3px;}
    .play-btn{width:88px;height:88px;border-radius:28px;color:#fff;display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite;font-size:42px;}
    .speed-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
    .speed-btn{border-radius:12px;color:#fff;font-size:14px;padding:7px 13px;}
    .vol-row{display:flex;align-items:center;gap:10px;width:100%;margin-bottom:16px;}
    .vol-bar{flex:1;height:6px;cursor:pointer;accent-color:#34d399;}

    /* SLEEP TIMER */
    .timer-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .timer-btn{border-radius:12px;border:2px solid rgba(255,255,255,0.15);color:#fff;font-size:13px;padding:7px 12px;background:rgba(255,255,255,0.08);}
    .timer-active{animation:timerPulse 2s ease-in-out infinite;}

    /* MINI PLAYER */
    #mini-player{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(15,23,42,0.95);backdrop-filter:blur(16px);border-top:2px solid rgba(255,255,255,0.1);padding:10px 16px;display:none;align-items:center;gap:12px;animation:slideUp 0.3s ease;}
    #mini-player.visible{display:flex;}
    .mini-cover{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
    .mini-info{flex:1;min-width:0;}
    .mini-title{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mini-sub{font-size:12px;color:rgba(255,255,255,0.5);}
    .mini-play-btn{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .mini-stop-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .mini-wave{display:flex;gap:2px;align-items:center;margin-right:4px;}
    .mini-wave-bar{width:3px;height:12px;border-radius:2px;background:rgba(255,255,255,0.6);animation:wave 0.7s ease-in-out infinite alternate;}

    /* ADMIN */
    .admin-panel{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:20px;padding:20px;margin-bottom:16px;}
    .admin-section-title{font-size:16px;font-weight:800;color:rgba(255,255,255,0.7);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .folder-status{background:rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:14px;color:rgba(255,255,255,0.6);display:flex;align-items:center;gap:10px;}
    .folder-pick-btn{background:linear-gradient(135deg,#f472b6,#fbbf24);border-radius:14px;color:#fff;font-size:15px;font-weight:800;padding:12px 18px;width:100%;margin-top:4px;}

    /* USER MANAGEMENT */
    .user-manage-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.06);border-radius:16px;padding:12px 14px;margin-bottom:10px;}
    .add-user-btn{width:100%;background:rgba(255,255,255,0.08);border:2px dashed rgba(255,255,255,0.2);border-radius:16px;color:rgba(255,255,255,0.6);font-size:16px;font-weight:700;padding:14px;margin-top:4px;}

    /* LIMIT SETTINGS */
    .limit-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
    .limit-toggle{position:relative;width:48px;height:26px;flex-shrink:0;}
    .limit-toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;inset:0;border-radius:13px;background:rgba(255,255,255,0.2);transition:0.3s;}
    .toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;border-radius:50%;background:#fff;transition:0.3s;}
    .limit-toggle input:checked+.toggle-slider{background:#10B981;}
    .limit-toggle input:checked+.toggle-slider:before{transform:translateX(22px);}
    .limit-input{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:16px;padding:6px 10px;width:70px;text-align:center;}

    /* PIN */
    .pin-dots{display:flex;gap:12px;justify-content:center;margin:20px 0;}
    .pin-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.2s;}
    .pin-dot.filled{background:#f472b6;}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto;}
    .pin-key{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:16px;color:#fff;font-size:24px;font-weight:800;padding:18px;text-align:center;}
    .pin-key.del{font-size:18px;background:rgba(255,100,100,0.15);border-color:rgba(255,100,100,0.2);}

    /* EDIT USERS */
    .edit-row{display:flex;gap:14px;align-items:flex-start;background:rgba(255,255,255,0.06);border-radius:18px;padding:14px;margin-bottom:12px;}
    .name-input{width:100%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:18px;padding:8px 14px;margin-bottom:8px;}
    .avatar-row{display:flex;flex-wrap:wrap;gap:6px;}
    .emoji-btn{width:36px;height:36px;border-radius:50%;font-size:19px;}

    #audio-player{display:none;}
  </style>
</head>
<body>
<div id="root"></div>
<div id="mini-player">
  <div class="mini-cover" id="mp-cover"></div>
  <div class="mini-info">
    <div class="mini-title" id="mp-title"></div>
    <div class="mini-sub" id="mp-sub"></div>
  </div>
  <div class="mini-wave" id="mp-wave" style="display:none">
    <div class="mini-wave-bar" style="animation-delay:0.1s"></div>
    <div class="mini-wave-bar" style="animation-delay:0.2s"></div>
    <div class="mini-wave-bar" style="animation-delay:0.3s"></div>
  </div>
  <button class="mini-play-btn" id="mp-play-btn" onclick="miniTogglePlay()"></button>
  <button class="mini-stop-btn" onclick="miniStop()" title="Stoppen">⏹</button>
  <button class="mini-stop-btn" onclick="goToPlayer()" title="Zum Player" style="font-size:14px">▲</button>
</div>
<audio id="audio-player" preload="none"></audio>

<script>
// ============================================================
// STORAGE
// ============================================================
const SK = "hoerspiel_v4";
function loadData(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}}
function saveData(d){localStorage.setItem(SK,JSON.stringify(d));}

// ============================================================
// STATE
// ============================================================
let appData = loadData();
let users   = appData._users || [];  // empty by default — admin must add

let libraryH = appData._libraryH || getDemoH();
let libraryM = appData._libraryM || getDemoM();
let folderH  = appData._folderH  || null;
let folderM  = appData._folderM  || null;

const ADMIN_PIN = "0000";
const AUDIO_EXT = /\.(mp3|m4a|ogg|aac|flac|wav|opus|wma)$/i;
const COLORS  = ["#F59E0B","#EC4899","#3B82F6","#10B981","#8B5CF6","#EF4444","#F97316","#06B6D4","#84CC16","#F43F5E"];
const EMOJIS_H= ["🔍","🧙‍♀️","🐘","🧚","🕵️","🦕","🐯","⚡","🌙","🎭"];
const EMOJIS_M= ["🎵","🎶","🎸","🥁","🎹","🎺","🎻","🪗","🎤","🎧"];
const ALL_AV  = ["🐻","🦊","🐸","🐼","🐯","🦁","🐨","🐰","🦄","🐙","🦋","🐬","🐺","🦝","🐧","🐱","🐮","🐷","🐔","🦆"];
const ALL_COLORS=["#FF6B9D","#F59E0B","#10B981","#8B5CF6","#3B82F6","#EF4444","#F97316","#06B6D4","#EC4899","#84CC16"];

let currentUser    = null;
let currentMode    = null;
let selectedSeries = null;
let selectedEp     = null;
let playerStartPos = 0;
let playSpeed      = 1;
let isPlaying      = false;
let sleepTimer     = null;
let sleepMinutes   = null;
let usageInterval  = null;

// Playback state for mini player
let nowPlayingSeries = null;
let nowPlayingEp     = null;
let nowPlayingMode   = null;

const audioEl = document.getElementById("audio-player");
const root    = document.getElementById("root");
const miniEl  = document.getElementById("mini-player");

// ============================================================
// DEMO DATA
// ============================================================
function getDemoH(){return[
  {id:"3f",title:"Die drei ???",emoji:"🔍",color:"#F59E0B",type:"series",episodes:[
    {id:"3f-1",number:1,title:"Und der Super-Papagei",file:"",duration:3600},
    {id:"3f-2",number:2,title:"Und das Gespensterschloss",file:"",duration:3400},
  ]},
  {id:"bibi",title:"Bibi Blocksberg",emoji:"🧙‍♀️",color:"#EC4899",type:"series",episodes:[
    {id:"bibi-1",number:1,title:"Bibi Blocksberg",file:"",duration:2700},
    {id:"bibi-2",number:2,title:"Bibi und der Zauberbesen",file:"",duration:2400},
  ]},
];}
function getDemoM(){return[
  {id:"kl",title:"Kinderlieder",emoji:"🎵",color:"#10B981",type:"series",episodes:[
    {id:"kl-1",number:1,title:"Alle meine Entchen",file:"",duration:90},
    {id:"kl-2",number:2,title:"Hänschen klein",file:"",duration:85},
  ]},
];}

// ============================================================
// HELPERS
// ============================================================
function fmt(s){if(!s||isNaN(s))return"0:00";return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;}
function render(node){root.innerHTML="";root.appendChild(node);updateMiniPlayer();}
function el(tag,cls,html=""){const d=document.createElement(tag);if(cls)d.className=cls;if(html)d.innerHTML=html;return d;}
function getUserData(uid){return appData[uid||currentUser?.id]||{};}
function saveProgress(epId,pos){
  if(!currentUser)return;
  appData[currentUser.id]=appData[currentUser.id]||{};
  appData[currentUser.id][epId]={position:pos,updatedAt:Date.now()};
  saveData(appData);
}
function getPos(epId){return appData[currentUser?.id]?.[epId]?.position||0;}
function currentLib(){return currentMode==="hoerspiele"?libraryH:libraryM;}
function isFav(seriesId){return (appData[currentUser?.id]?._favs||[]).includes(seriesId);}
function toggleFav(seriesId){
  const ud=appData[currentUser.id]=appData[currentUser.id]||{};
  ud._favs=ud._favs||[];
  ud._favs=ud._favs.includes(seriesId)?ud._favs.filter(f=>f!==seriesId):[...ud._favs,seriesId];
  saveData(appData);
}
function getLastPlayed(uid){return appData[uid]?._lastPlayed||null;}
function setLastPlayed(seriesId,epId,mode){
  appData[currentUser.id]=appData[currentUser.id]||{};
  appData[currentUser.id]._lastPlayed={seriesId,epId,mode,ts:Date.now()};
  saveData(appData);
}
function getTodayUsage(uid){
  const today=new Date().toDateString();
  return appData[uid]?._usage?.[today]||0;
}
function addUsage(uid,seconds){
  const today=new Date().toDateString();
  appData[uid]=appData[uid]||{};
  appData[uid]._usage=appData[uid]._usage||{};
  appData[uid]._usage[today]=(appData[uid]._usage[today]||0)+seconds;
  saveData(appData);
}
function getLimitSeconds(uid){
  const u=users.find(x=>x.id===uid);
  if(!u||!u.limitEnabled||!u.limitMinutes)return null;
  return u.limitMinutes*60;
}
function isLimitReached(uid){
  const lim=getLimitSeconds(uid);
  if(!lim)return false;
  return getTodayUsage(uid)>=lim;
}
function makeStar(i){const d=document.createElement("div");d.className="star";d.style.cssText=`left:${(i*37+11)%100}%;top:${(i*53+7)%100}%;width:${i%5===0?3:2}px;height:${i%5===0?3:2}px;background:rgba(255,255,255,${0.2+(i%4)*0.12});animation-duration:${3+(i%4)}s;animation-delay:${(i*0.3)%4}s`;return d;}
function starsDiv(){const d=document.createElement("div");d.className="stars";for(let i=0;i<35;i++)d.appendChild(makeStar(i));return d;}
function stripExt(n){return n.replace(/\.[^.]+$/,"");}
function getAudioDuration(url){return new Promise(resolve=>{const a=new Audio();a.src=url;a.onloadedmetadata=()=>resolve(Math.round(a.duration));a.onerror=()=>resolve(0);setTimeout(()=>resolve(0),4000);});}

function updateMiniPlayer(){
  if(!nowPlayingEp||!nowPlayingSeries){miniEl.classList.remove("visible");return;}
  miniEl.classList.add("visible");
  document.getElementById("mp-cover").textContent=nowPlayingSeries.emoji;
  document.getElementById("mp-cover").style.background=nowPlayingSeries.color;

  document.getElementById("mp-wave").style.display=isPlaying?"flex":"none";
}
function miniTogglePlay(){
  if(isPlaying){audioEl.pause();isPlaying=false;}
  else{if(audioEl.src)audioEl.play();isPlaying=true;}
  updateMiniPlayer();
  if(currentPlayerUpdateFn) currentPlayerUpdateFn();
}
function miniStop(){
  audioEl.pause();isPlaying=false;
  if(nowPlayingEp) saveProgress(nowPlayingEp.id,Math.round(audioEl.currentTime||playerCurPos));
  nowPlayingEp=null;nowPlayingSeries=null;nowPlayingMode=null;
  clearSleepTimer();
  updateMiniPlayer();
  if(currentPlayerUpdateFn) currentPlayerUpdateFn();
}
function goToPlayer(){
  if(!nowPlayingEp||!nowPlayingSeries)return;
  selectedSeries=nowPlayingSeries;
  selectedEp=nowPlayingEp;
  currentMode=nowPlayingMode;
  playerStartPos=Math.round(audioEl.currentTime||0);
  screenPlayer();
}
let currentPlayerUpdateFn=null;
let playerCurPos=0;

// ============================================================
// SLEEP TIMER
// ============================================================
function setSleepTimer(minutes){
  clearSleepTimer();
  if(!minutes){sleepMinutes=null;return;}
  sleepMinutes=minutes;
  sleepTimer=setTimeout(()=>{
    miniStop();
    sleepMinutes=null;
    alert("😴 Einschlaf-Timer abgelaufen! Gute Nacht!");
  },minutes*60*1000);
}
function clearSleepTimer(){if(sleepTimer){clearTimeout(sleepTimer);sleepTimer=null;}}

// ============================================================
// USAGE TRACKING
// ============================================================
function startUsageTracking(uid){
  stopUsageTracking();
  usageInterval=setInterval(()=>{
    if(isPlaying){
      addUsage(uid,1);
      const lim=getLimitSeconds(uid);
      if(lim&&getTodayUsage(uid)>=lim){
        miniStop();
        alert(`⏰ Die Hörzeit für heute ist aufgebraucht!\nBitte frage einen Erwachsenen.`);
        stopUsageTracking();
      }
    }
  },1000);
}
function stopUsageTracking(){if(usageInterval){clearInterval(usageInterval);usageInterval=null;}}

  const back=el("button","back-btn","← Zurück");back.style.marginBottom="0";back.onclick=screenModeSelect;

  sb.appendChild(sinp);hdr.appendChild(sb);

  const listWrap=el("div","list-wrap");page.appendChild(listWrap);

  function buildList(q=""){
    listWrap.innerHTML="";
    const ud=getUserData();
    const favIds=ud._favs||[];
    let filtered=lib.filter(s=>s.title.toLowerCase().includes(q.toLowerCase()));
    // Favorites first
    filtered.sort((a,b)=>{
      const af=favIds.includes(a.id)?0:1;
      const bf=favIds.includes(b.id)?0:1;
      return af-bf;
    });
    if(filtered.length===0){
      const b=el("div","");b.style.cssText="text-align:center;color:rgba(255,255,255,0.4);padding:40px 20px;font-size:15px";
      b.innerHTML="Keine Einträge gefunden.<br/>Bitte den Admin bitten, den Ordner einzurichten.";
      listWrap.appendChild(b);return;
    }
    filtered.forEach((s,i)=>{
      let started=0;
      s.episodes.forEach(ep=>{if((getUserData()[ep.id]?.position||0)>5)started++;});
      const pct=s.episodes.length>0?Math.round((started/s.episodes.length)*100):0;
      const fav=isFav(s.id);
      const card=el("button","series-card card-hover fade-in");
      card.style.animationDelay=`${i*0.06}s`;

          <span class="series-meta">${s.type==="single"?(isM?"🎵 Einzeltitel":"🎵 Einzelhörspiel"):`📚 ${s.episodes.length} ${isM?"Lieder":"Folgen"}`}${started>0?` <span style="color:${s.color}">· ${started} gehört</span>`:""}</span>
          ${started>0?`<div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>`:""}
        </div>`;
      const favB=el("button","fav-btn",fav?"⭐":"☆");
      favB.title=fav?"Aus Favoriten entfernen":"Zu Favoriten hinzufügen";
      favB.onclick=e=>{e.stopPropagation();toggleFav(s.id);buildList(sinp.value);};
      card.appendChild(favB);
      card.onclick=()=>{selectedSeries=s;s.type==="single"?openEpisode(s.episodes[0]):screenEpisodes();};
      listWrap.appendChild(card);
    });
  }
  buildList();
  render(page);
}

function screenPlayer(){

  const isM=currentMode==="musik";

  // Update global now-playing
  nowPlayingSeries=s;nowPlayingEp=ep;nowPlayingMode=currentMode;
  setLastPlayed(s.id,ep.id,currentMode);

  if(ep.file){audioEl.src=ep.file;audioEl.currentTime=curPos;audioEl.playbackRate=playSpeed;}

  const page=el("div","page");
  page.style.background=`linear-gradient(160deg,${s.color}18 0%,#0f172a 55%)`;
  page.appendChild(starsDiv());
  const wrap=el("div","player-wrap");

  // Top
  const top=el("div","player-top");
  const back=el("button","back-btn","← Zurück");

  // Cover
  const cover=el("div","player-cover");
  cover.style.cssText=`background:${s.color};box-shadow:0 24px 60px ${s.color}55`;
  cover.innerHTML=`<span style="font-size:90px">${s.emoji}</span>`;
  const waveRow=el("div","wave-row");
  for(let i=1;i<=5;i++){const b=el("div","wave-bar");b.style.animationDelay=`${i*0.12}s`;waveRow.appendChild(b);}
  waveRow.style.display="none";cover.appendChild(waveRow);wrap.appendChild(cover);

  const sl=el("p","");sl.style.cssText="color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:2px;text-align:center";sl.textContent=s.title;wrap.appendChild(sl);
  const etl=el("h2","app-title",ep.title);etl.style.cssText="font-size:20px;text-align:center;margin-bottom:20px";wrap.appendChild(etl);

  // Seek
  const seekRow=el("div","seek-row");
  const timeCur=el("span","time-label",fmt(curPos));
  const seekBar=document.createElement("input");seekBar.type="range";seekBar.className="seek-bar";seekBar.min=0;seekBar.max=ep.duration||3600;seekBar.value=curPos;
  const timeDur=el("span","time-label",fmt(ep.duration));
  seekRow.appendChild(timeCur);seekRow.appendChild(seekBar);seekRow.appendChild(timeDur);wrap.appendChild(seekRow);

  function updateUI(){timeCur.textContent=fmt(curPos);seekBar.value=curPos;updateMiniPlayer();}
  seekBar.oninput=e=>{curPos=Number(e.target.value);timeCur.textContent=fmt(curPos);if(ep.file)audioEl.currentTime=curPos;};
  seekBar.onchange=()=>saveProgress(ep.id,curPos);

  // Controls
  const controls=el("div","controls");
  const skipB=el("button","skip-btn");skipB.innerHTML=`<span style="font-size:26px">⏮</span><span style="font-size:11px;opacity:0.7">30s</span>`;
  skipB.onclick=()=>{curPos=Math.max(0,curPos-30);updateUI();if(ep.file)audioEl.currentTime=curPos;saveProgress(ep.id,curPos);};
  const playBtn=el("button","play-btn","▶");playBtn.style.cssText=`background:${s.color};box-shadow:0 8px 28px ${s.color}88`;
  const skipF=el("button","skip-btn");skipF.innerHTML=`<span style="font-size:26px">⏭</span><span style="font-size:11px;opacity:0.7">30s</span>`;
  skipF.onclick=()=>{curPos=Math.min(ep.duration||9999,curPos+30);updateUI();if(ep.file)audioEl.currentTime=curPos;saveProgress(ep.id,curPos);};
  controls.appendChild(skipB);controls.appendChild(playBtn);controls.appendChild(skipF);wrap.appendChild(controls);

  let ticker=null;
  function startPb(){isPlaying=true;playBtn.textContent="⏸";waveRow.style.display="flex";if(ep.file)audioEl.play();else ticker=setInterval(()=>{curPos=Math.min(ep.duration,curPos+playSpeed);playerCurPos=curPos;updateUI();if(curPos>=ep.duration)stopPb();if(Math.round(curPos)%10===0)saveProgress(ep.id,curPos);},1000);updateMiniPlayer();}
  function stopPb(){isPlaying=false;playBtn.textContent="▶";waveRow.style.display="none";if(ep.file)audioEl.pause();else{clearInterval(ticker);ticker=null;}saveProgress(ep.id,curPos);updateMiniPlayer();}
  playBtn.onclick=()=>{if(isPlaying)stopPb();else startPb();};
  currentPlayerUpdateFn=()=>{playBtn.textContent=isPlaying?"⏸":"▶";waveRow.style.display=isPlaying?"flex":"none";};
  if(ep.file){
    audioEl.ontimeupdate=()=>{if(isPlaying){curPos=Math.round(audioEl.currentTime);playerCurPos=curPos;updateUI();}};
    audioEl.onended=()=>stopPb();
  }

  // Volume
  const volRow=el("div","vol-row");
  volRow.innerHTML=`<span style="font-size:18px">🔈</span>`;
  const volBar=document.createElement("input");volBar.type="range";volBar.className="vol-bar";volBar.min=0;volBar.max=100;volBar.value=Math.round((audioEl.volume||1)*100);
  volBar.oninput=e=>{audioEl.volume=Number(e.target.value)/100;};

  volRow.appendChild(volBar);volRow.appendChild(volLbl);wrap.appendChild(volRow);

  // Speed (only for Hörspiele)
  if(!isM){
    const speedRow=el("div","speed-row");
    speedRow.innerHTML=`<span style="color:rgba(255,255,255,0.4);font-size:13px;margin-right:4px">Tempo:</span>`;
    [0.8,1,1.2,1.5].forEach(sp=>{
      const b=el("button","speed-btn",`${sp}×`);
      b.style.cssText=`background:${playSpeed===sp?s.color:"rgba(255,255,255,0.1)"};font-weight:${playSpeed===sp?800:600}`;
      b.onclick=()=>{playSpeed=sp;audioEl.playbackRate=sp;speedRow.querySelectorAll(".speed-btn").forEach(bb=>{bb.style.background="rgba(255,255,255,0.1)";bb.style.fontWeight=600;});b.style.background=s.color;b.style.fontWeight=800;};
      speedRow.appendChild(b);
    });
    wrap.appendChild(speedRow);
  }

  // Sleep timer
  const timerRow=el("div","timer-row");
  timerRow.innerHTML=`<span style="color:rgba(255,255,255,0.4);font-size:13px">🌙 Timer:</span>`;
  [null,15,30,60].forEach(m=>{
    const b=el("button","timer-btn",m?`${m} Min`:"Aus");
    const isActive=sleepMinutes===m;
    if(isActive){b.style.cssText=`background:${s.color}44;border-color:${s.color};color:${s.color};`;b.classList.add("timer-active");}
    b.onclick=()=>{setSleepTimer(m);timerRow.querySelectorAll(".timer-btn").forEach(tb=>{tb.style.cssText="";tb.classList.remove("timer-active");});if(m){b.style.cssText=`background:${s.color}44;border-color:${s.color};color:${s.color}`;b.classList.add("timer-active");}};
    timerRow.appendChild(b);
  });
  wrap.appendChild(timerRow);
  page.appendChild(wrap);
  render(page);

  // Resume playback if was playing
  if(isPlaying) startPb();
}

// ADMIN PIN
// ============================================================
function screenAdminPin(){
  let pin="";
  const page=el("div","page");page.appendChild(starsDiv());
  const col=el("div","center-col");
  const back=el("button","back-btn","← Zurück");back.style.alignSelf="flex-start";back.onclick=screenUserSelect;col.appendChild(back);
  col.innerHTML+=`<div style="font-size:56px;margin-bottom:4px">🔐</div>`;
  const h=el("h2","app-title","Admin");h.style.fontSize="32px";col.appendChild(h);
  const sub=el("p","subtitle","PIN eingeben");sub.style.marginTop="4px";col.appendChild(sub);
  const dots=el("div","pin-dots");
  for(let i=0;i<4;i++){const d=el("div","pin-dot");d.id=`dot-${i}`;dots.appendChild(d);}
  col.appendChild(dots);
  const errMsg=el("p","");errMsg.style.cssText="color:#f87171;font-size:15px;height:20px;margin-bottom:8px;text-align:center";col.appendChild(errMsg);
  const grid=el("div","pin-grid");
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k=>{
    const btn=el("button",k==="⌫"?"pin-key del":"pin-key",String(k));
    if(k===""){btn.style.visibility="hidden";grid.appendChild(btn);return;}
    btn.onclick=()=>{
      if(k==="⌫"){if(pin.length>0){pin=pin.slice(0,-1);upd();}return;}
      if(pin.length>=4)return;
      pin+=String(k);upd();
      if(pin.length===4){
        if(pin===ADMIN_PIN)screenAdmin();
        else{errMsg.textContent="❌ Falscher PIN";pin="";upd();dots.classList.add("shake");setTimeout(()=>dots.classList.remove("shake"),400);setTimeout(()=>errMsg.textContent="",1500);}
      }
    };
    grid.appendChild(btn);
  });
  col.appendChild(grid);page.appendChild(col);render(page);
  function upd(){for(let i=0;i<4;i++){const d=document.getElementById(`dot-${i}`);if(d)d.className="pin-dot"+(i<pin.length?" filled":"");}}
}

// ============================================================
// FOLDER PICKER
// ============================================================
async function pickFolder(mode){
  if(!window.showDirectoryPicker){alert("Bitte Chrome oder Edge verwenden.");return;}
  try{
    const dh=await window.showDirectoryPicker({mode:"read"});
    const lib=await buildLib(dh,mode);
    if(lib.length===0){alert("Keine Audiodateien gefunden!");return;}
    if(mode==="h"){libraryH=lib;folderH=dh.name;appData._libraryH=lib;appData._folderH=dh.name;}
    else{libraryM=lib;folderM=dh.name;appData._libraryM=lib;appData._folderM=dh.name;}
    saveData(appData);alert(`✅ ${lib.length} Einträge aus "${dh.name}" geladen!`);
  }catch(e){if(e.name!=="AbortError")alert("Fehler: "+e.message);}
}
async function buildLib(dh,mode){
  const lib=[];let ci=0;
  const emojis=mode==="m"?EMOJIS_M:EMOJIS_H;
  for await(const[name,handle]of dh.entries()){
    if(handle.kind==="directory"){
      const eps=[];let n=1;const subs=[];
      for await(const[fn,fh]of handle.entries()){if(fh.kind==="file"&&AUDIO_EXT.test(fn))subs.push([fn,fh]);}
      subs.sort((a,b)=>a[0].localeCompare(b[0],undefined,{numeric:true}));
      for(const[fn,fh]of subs){const file=await fh.getFile();const url=URL.createObjectURL(file);const dur=await getAudioDuration(url);eps.push({id:`${name}-${n}`,number:n,title:stripExt(fn),file:url,duration:dur});n++;}
      if(eps.length>0){lib.push({id:name,title:name,emoji:emojis[ci%emojis.length],color:COLORS[ci%COLORS.length],type:eps.length===1?"single":"series",episodes:eps});ci++;}
    }else if(handle.kind==="file"&&AUDIO_EXT.test(name)){
      const file=await handle.getFile();const url=URL.createObjectURL(file);const dur=await getAudioDuration(url);const id=stripExt(name);
      lib.push({id,title:id,emoji:emojis[ci%emojis.length],color:COLORS[ci%COLORS.length],type:"single",episodes:[{id:`${id}-1`,number:1,title:id,file:url,duration:dur}]});ci++;
    }
  }
  lib.sort((a,b)=>a.title.localeCompare(b.title,"de"));return lib;
}
